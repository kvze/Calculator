<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Calculator</title>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="display-additional">
                нул
            </div>
            <div class="display-main">
                0
            </div>
        </div>
        <div class="buttons">
            <button class="button button-light-gray button-backspace">
                <img src="img/backspace.svg" alt="" width="50px" height="50px" class="backspace">
            </button>
            <button class="button button-light-gray">AC</button>
            <button class="button button-light-gray">%</button>
            <button class="button button-orange">/</button>
            <button class="button button-gray">7</button>
            <button class="button button-gray">8</button>
            <button class="button button-gray">9</button>
            <button class="button button-orange">x</button>
            <button class="button button-gray">4</button>
            <button class="button button-gray">5</button>
            <button class="button button-gray">6</button>
            <button class="button button-orange">-</button>
            <button class="button button-gray">1</button>
            <button class="button button-gray">2</button>
            <button class="button button-gray">3</button>
            <button class="button button-orange">+</button>
            <button class="button button-gray">+/-</button>
            <button class="button button-gray">0</button>
            <button class="button button-gray">,</button>
            <button class="button button-orange">=</button>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
