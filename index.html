<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/icon.svg" type="image/svg+xml" sizes="any">
    <title>Calculator</title>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="display-additional visually-hidden">
                NULL
            </div>
            <div class="display-main">
                0
            </div>
        </div>
        <div class="buttons">
            <button class="button button-light-gray button-backspace" data-type="action" data-value="backspace">
                <img src="img/backspace.svg" alt="" width="50px" height="50px" class="backspace">
            </button>
            <button class="button button-light-gray" data-type="action" data-value="clear">AC</button>
            <button class="button button-light-gray" data-type="action" data-value="percent">%</button>
            <button class="button button-orange" data-type="operator" data-value="/">/</button>
            <button class="button button-gray" data-type="digit" data-value="7">7</button>
            <button class="button button-gray" data-type="digit" data-value="8">8</button>
            <button class="button button-gray" data-type="digit" data-value="9">9</button>
            <button class="button button-orange" data-type="operator" data-value="*">x</button>
            <button class="button button-gray" data-type="digit" data-value="4">4</button>
            <button class="button button-gray" data-type="digit" data-value="5">5</button>
            <button class="button button-gray" data-type="digit" data-value="6">6</button>
            <button class="button button-orange" data-type="operator" data-value="-">-</button>
            <button class="button button-gray" data-type="digit" data-value="1">1</button>
            <button class="button button-gray" data-type="digit" data-value="2">2</button>
            <button class="button button-gray" data-type="digit" data-value="3">3</button>
            <button class="button button-orange" data-type="operator" data-value="+">+</button>
            <button class="button button-gray" data-type="action" data-value="toggle-sign">+/-</button>
            <button class="button button-gray" data-type="digit" data-value="0">0</button>
            <button class="button button-gray" data-type="action" data-value="decimal">.</button>
            <button class="button button-orange" data-type="action" data-value="equals">=</button>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
